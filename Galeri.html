<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galeri - Panti Asuhan Darul Muttaqin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* THEME: FRESH SKY BLUE & WHITE */
    :root {
      --primary-blue: #3b82f6;    /* Biru Cerah Utama */
      --bright-blue: #60a5fa;     /* Biru Muda */
      --soft-blue: #f0f9ff;       /* Biru Pucat Segar */
      --text-main: #0f172a;       /* Navy Gelap */
      --text-muted: #64748b;      /* Abu-abu */
      --bg-white: #ffffff;
      --border: #e0f2fe;
    }

    body.dark-mode {
      --primary-blue: #60a5fa;
      --bright-blue: #93c5fd;
      --soft-blue: #082f49;
      --text-main: #f0f9ff;
      --text-muted: #94a3b8;
      --bg-white: #0c4a6e;
      --border: #0ea5e9;
    }

    * { box-sizing: border-box; scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-white);
      color: var(--text-main);
      transition: all 0.3s ease;
    }

    /* 1. TOP NAVIGATION (KEMBALI KE DASHBOARD) */
    .nav-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    body.dark-mode .nav-header { background: rgba(12, 74, 110, 0.9); }

    .btn-back {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
    }

    .btn-back:hover { color: var(--bright-blue); transform: translateX(-5px); }

    .theme-toggle {
      color: var(--primary-blue);
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.3s;
    }

    /* 2. HERO SECTION */
    .hero {
      padding: 140px 20px 60px;
      text-align: center;
      background-color: var(--soft-blue);
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      color: var(--primary-blue);
      margin-bottom: 15px;
      letter-spacing: -1.5px;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* 3. GALERI GRID (RAPI & SIMPEL) */
    .galeri-section {
      padding: 60px 5% 100px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }

    .grid-item {
      background: var(--bg-white);
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 4/3;
      border: 1px solid var(--border);
      transition: all 0.4s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.5s ease;
    }

    .grid-item:hover {
      transform: translateY(-10px);
      border-color: var(--bright-blue);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15);
    }

    .grid-item:hover img { transform: scale(1.08); }

    /* 4. FOOTER */
    footer {
      background: var(--primary-blue);
      color: white;
      text-align: center;
      padding: 80px 20px;
      border-radius: 50px 50px 0 0;
    }

    .footer-brand { font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
    
    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
    }

    .social-links a {
      color: var(--primary-blue);
      background: white;
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 1.2rem;
      transition: 0.3s;
    }

    .social-links a:hover {
      background: var(--bright-blue);
      color: white;
      transform: translateY(-5px);
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav-header">
    <a href="index.html" class="btn-back">
      <i class="fas fa-chevron-left"></i> KEMBALI KE DASHBOARD
    </a>
    <div class="theme-toggle" onclick="toggleMode()">
      <i class="fas fa-moon" id="modeIcon"></i>
    </div>
  </nav>

  <section class="hero">
    <h1>Galeri Momen</h1>
    <p>Kumpulan kenangan indah dan dokumentasi keceriaan di Panti Asuhan Darul Muttaqin.</p>
  </section>

  <main class="galeri-section">
    <div class="grid">
      <div class="grid-item"><img src="1.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="2.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="3.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="4.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="5.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="6.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="7.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="8.jpeg" alt="Kegiatan Panti"></div>
      <div class="grid-item"><img src="9.jpeg" alt="Kegiatan Panti"></div>
    </div>
  </main>

  <footer>
    <div class="footer-brand">DARUL MUTTAQIN</div>
    <p style="opacity: 0.9; font-weight: 500;">Membina Harapan, Menyinari Masa Depan Bangsa.</p>
    
    <div class="social-links">
      <a href="https://instagram.com/pa_darulmuttaqin"><i class="fab fa-instagram"></i></a>
      <a href="https://wa.me/6282245185893"><i class="fab fa-whatsapp"></i></a>
    </div>
    
    <p style="font-size: 0.8rem; opacity: 0.7;">&copy; 2026 Panti Asuhan Darul Muttaqin Pasuruan.</p>
  </footer>

  <script>
    function toggleMode() {
      const body = document.body;
      const icon = document.getElementById('modeIcon');
      body.classList.toggle('dark-mode');
      
      if(body.classList.contains('dark-mode')) {
        icon.classList.replace('fa-moon', 'fa-sun');
      } else {
        icon.classList.replace('fa-sun', 'fa-moon');
      }
    }
  </script>
</body>
</html>
